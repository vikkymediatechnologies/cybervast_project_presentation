<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybervast Tech Roadmap Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <!-- logo-image -->
                 <img src="/img/logo.png" class="logo-img" alt="">
                 <span>CareerPatch</span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
     <section class="hero" id="hero">
        <div class="hero-background">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
        </div>

        <div class="hero-content">
            <div class="hero-badge">
                <span class="badge-dot"></span>
                Cybervast Tech Roadmap
            </div>
            <h1 class="hero-title">Apply Smart.<br><span class="gradient-text">Grow Smarter</span></h1>
            <p class="hero-stats">Answer Basic questions our engine suggest perfect tech career for you, with Roadmap</p>

            <div class="hero-stats">
                <div class="stat">
                    <span class="stat-number">5</span>
                    <span class="stat-label">Roadmaps Generated</span>
                </div>

                <div class="stat">
                    <span class="stat-number">70%</span>
                    <span class="stat-label">Success Rate</span>
                </div>

                <div class="stat">
                    <span class="stat-number">3</span>
                    <span class="stat-label">Career Tracks</span>
                </div>
            </div>

            <!-- Get Started Button -->
             <p>No Signup required</p>
             <button class="cta-button" onclick="scrollToForm()">
                <span>Begin Assessment</span>
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M10 4V16M10 16L4 10M10 16L16 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
             </button>
              <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
        </div>
        </div>
     </section>
</body>
</html>
